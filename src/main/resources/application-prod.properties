# ── Production profile (Azure App Service) ───────────────────────────────────
# Set these environment variables in Azure App Service → Configuration → App Settings:
#   MYSQL_URL       jdbc:mysql://<host>:3306/emsafe_db?useSSL=true&serverTimezone=UTC
#   MYSQL_USER      your_mysql_user
#   MYSQL_PASSWORD  your_mysql_password
#   JWT_SECRET      base64-encoded secret (min 32 bytes)

spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP — evita conexiones muertas con TiDB Cloud Serverless (cierra idle a los ~60s)
spring.datasource.hikari.max-lifetime=55000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.idle-timeout=45000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-test-query=SELECT 1

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.com.emsafe=INFO
logging.level.org.springframework.security=WARN

server.port=${PORT:8080}

# ── Gemini (chatbot "Astra") — set GEMINI_API_KEY in Azure App Settings ──────
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash
