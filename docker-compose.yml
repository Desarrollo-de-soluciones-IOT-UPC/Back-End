services:
  db:
    image: mysql:8
    container_name: emsafe-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: emsafe_db
    ports:
      - "3306:3306"
    volumes:
      - emsafe-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  emsafe-db-data:
